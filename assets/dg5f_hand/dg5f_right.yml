# Tesollo DG-5F (5-finger dex hand) — right hand only.
# Single-hand only — UR10e + DG-5F sim/real 환경에서 right hand만 사용.
#
# Retarget 권장 설정 (retarget_dev/docs/dg5f_tuning.md 검증):
# - type: DexPilot  (pinch 정확도, vector 보다 robust)
# - URDF: dg5f_right_retarget.urdf (PIP/DIP lower=0 으로 음수 영역 제거 — 손등 꺾임 방지)
# - scaling_factor: 1.2 (사람 손 ~1.2배 확대해 DG-5F 스케일 매칭)
# - low_pass_alpha: 0.2 (스무딩, sim test 에서 조정 가능)
#
# 핵심 설계 변경 vs 이전 vector type:
# - 이전: vector type, 6 target joint, palm→tip 5 vector, mimic 0.6/0.4 로 distal 확장
# - 현재: DexPilot type, 20 free joint 전체 retarget, fingertip pair distance cost 포함
#   → 손가락 굽힘 magnitude 정확. mimic expansion 불필요.
#
# WebXR 25-joint fingertip 인덱스 (참고):
#   wrist=0, thumb=4, index=9, middle=14, ring=19, pinky=24
# DexPilot 의 target_link_human_indices 는 generate_link_indices() 가 내부 자동 생성.
# 단 fingertip 인덱스를 명시해야 한다면 WebXR 기준 [0, 4, 9, 14, 19, 24] 사용.

right:
  type: DexPilot
  urdf_path: dg5f_hand/dg5f_right_retarget.urdf

  # DexPilot 필수: wrist + 5 fingertip link
  wrist_link_name: "rl_dg_palm"
  finger_tip_link_names:
    - "rl_dg_1_tip"  # Thumb
    - "rl_dg_2_tip"  # Index
    - "rl_dg_3_tip"  # Middle
    - "rl_dg_4_tip"  # Ring
    - "rl_dg_5_tip"  # Pinky

  # 사람 손 ~1.2배 확대 (DG-5F가 1.2~1.3배 큼)
  scaling_factor: 1.2
  # 작을수록 smooth, latency ↑
  low_pass_alpha: 0.2
