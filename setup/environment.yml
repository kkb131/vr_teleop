# 공식 xr_teleoperate README와 동일한 conda env (https://github.com/unitreerobotics/xr_teleoperate)
# nada more — 나머지 의존성(casadi, meshcat, vuer, opencv, matplotlib 등)은 install.sh가 pip로 처리한다.
# pip 패키지를 conda로 끌어올리면 transitive dep끼리 RECORD 파일 충돌이 발생하므로 일부러 conda는 3개만.
name: tv
channels:
  - conda-forge
dependencies:
  - python=3.10
  - pinocchio=3.1.0          # casadi backend 자동 포함 (conda-forge build)
  - numpy=1.26.4
  - pip                       # conda env에 pip를 명시적으로 (없으면 'No module named pip')
