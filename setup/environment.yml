name: tv
channels:
  - conda-forge
dependencies:
  - python=3.10
  - pinocchio=3.1.0
  - numpy=1.26.4
  - casadi              # conda-forge로 설치 (pinocchio가 transitive dep로 끌어오는 버전과 충돌 방지)
  - matplotlib=3.7.5    # 동일 — pip로 설치 시 conda 패키지를 못 uninstall(RECORD 없음)
  - opencv             # opencv-python 대신 conda-forge opencv
  - pip
  - pip:
      - meshcat==0.3.2
      - rerun-sdk==0.20.1
      - sshkeyboard==2.3.1
      - vuer[all]==0.0.60
      - params-proto<3        # vuer 0.0.60는 Flag/PrefixProto/Proto가 있는 2.x 시리즈 필요
